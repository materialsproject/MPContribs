version: 2
updates:
  # --- GitHub Actions: keep workflow action versions current ---
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: US/Pacific
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 10

  # --- Python via uv: monitors pyproject.toml + uv.lock --------
  - package-ecosystem: uv
    directory: "/mpcontribs-api"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: US/Pacific
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10

  # --- Existing entries ----------------------------------------
  - package-ecosystem: docker
    directory: "/mpcontribs-kernel-gateway"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: US/Pacific
    open-pull-requests-limit: 10
  - package-ecosystem: npm
    directory: "/mpcontribs-portal"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: US/Pacific
    open-pull-requests-limit: 10
  - package-ecosystem: docker
    directory: "/mpcontribs-portal"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: US/Pacific
    open-pull-requests-limit: 10
  - package-ecosystem: docker
    directory: "/mpcontribs-api"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: US/Pacific
    open-pull-requests-limit: 10
